<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SIB Bark</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card fade-up">

    <div class="login-logo">
      <div class="logo-text">BARK</div>
      <div class="logo-sub">Sistema Integral de Gestión · v2.0</div>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="msg {{ msg.tags }}" style="margin-bottom: 18px;">
          <i data-lucide="alert-circle" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>{{ msg }}</span>
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" autofocus autocomplete="username" required>
      </div>
      <div class="form-group" style="margin-bottom: 26px;">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Ingresar al Sistema</button>
    </form>

    <p style="text-align:center; font-size:12px; color: var(--txt-3); margin-top: 24px;">
      Maestranza Bark SpA · Acceso restringido a personal autorizado
    </p>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
